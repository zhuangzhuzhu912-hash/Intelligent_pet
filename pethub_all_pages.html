<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宠联中枢 - 跨品牌智能养宠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF9F43",
                        secondary: "#00B4D8",
                        success: "#52C41A",
                        warning: "#FAAD14"
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .iphone-frame { width: 393px; max-width: 100%; height: 852px; background: #F8F9FA; border-radius: 48px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 8px #3a3a3a; position: relative; }
        .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 110px; height: 34px; background: #111; border-radius: 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; color: white; font-size: 14px; font-weight: 600; }
        .app-content { height: calc(100% - 80px); overflow-y: auto; padding: 56px 16px 16px 16px; scrollbar-width: none; -ms-overflow-style: none; }
        .app-content::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 0.5px solid rgba(255,255,255,0.5); }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #52C41A; border: 2px solid white; border-radius: 50%; }
        .feed-btn-glow { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 4px 12px rgba(255, 159, 67, 0.25); } 50% { box-shadow: 0 6px 20px rgba(255, 159, 67, 0.4); } }
        .sonar-wave { animation: sonar 1.5s ease-out infinite; }
        @keyframes sonar { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2); opacity: 0; } }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
