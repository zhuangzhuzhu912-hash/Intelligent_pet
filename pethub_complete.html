<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宠联中枢 · 跨品牌智能养宠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#FF9F43',
                        'primary-light': '#FFB067',
                        'secondary': '#00B4D8',
                        'bg-light': '#F8F9FA',
                        'card-bg': 'rgba(255, 255, 255, 0.92)',
                        'success': '#52C41A',
                        'warning': '#FAAD14',
                    },
                    fontFamily: {
                        'sans': ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', 'sans-serif'],
                    },
                    borderRadius: {
                        'card': '20px',
                        'btn': '30px',
                    },
                    boxShadow: {
                        'card': '0 8px 24px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02)',
                        'btn': '0 4px 12px rgba(255, 159, 67, 0.25)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .iphone-frame {
            width: 393px;
            max-width: 100%;
            height: 852px;
            background: #F8F9FA;
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3), 0 0 0 8px #3a3a3a;
            position: relative;
        }
        .dynamic-island {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 34px;
            background: #111;
            border-radius: 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        .app-content {
            height: calc(100% - 80px);
            overflow-y: auto;
            padding: 56px 16px 16px 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .app-content::-webkit-scrollbar {
            display: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.5);
        }
        .page-content {
            display: none;
        }
        .page-content.active {
            display: block;
        }
        .avatar-wrapper {
            position: relative;
        }
        .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #52C41A;
            border: 2px solid white;
            border-radius: 50%;
        }
        .feed-btn-glow {
            animation: pulse-glow 2s infinite;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 4px 12px rgba(255, 159, 67, 0.25); }
            50% { box-shadow: 0 6px 20px rgba(255, 159, 67, 0.4); }
        }
        .sonar-wave {
            animation: sonar 1.5s ease-out infinite;
        }
        @keyframes sonar {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(2); opacity: 0; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="iphone-frame">
        <div class="dynamic-island">
            <span class="time">9:41</span>
            <div class="status-icons">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi"></i>
                <i class="fas fa-battery-full"></i>
            </div>
        </div>
        
        <div class="app-content">
            <!-- 首页内容 -->
            <div id="page-home" class="page-content active"></div>
            
            <!-- 设备页面 -->
            <div id="page-devices" class="page-content"></div>
            
            <!-- 健康页面 -->
            <div id="page-health" class="page-content"></div>
            
            <!-- 我的页面 -->
            <div id="page-profile" class="page-content"></div>
        </div>
        
        <!-- 底部 Tab Bar -->
        <div class="absolute bottom-0 left-0 right-0 h-20 bg-white/90 backdrop-blur-xl border-t border-gray-200/50 flex items-center justify-around px-4 rounded-b-[48px]">
            <div class="tab-item flex flex-col items-center text-primary cursor-pointer" onclick="switchPage('home')">
                <i class="fas fa-home text-2xl"></i>
                <span class="text-xs font-medium">首页</span>
            </div>
            <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage('devices')">
                <i class="fas fa-microchip text-2xl"></i>
                <span class="text-xs">设备</span>
            </div>
            <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage('health')">
                <i class="fas fa-heart-pulse text-2xl"></i>
                <span class="text-xs">健康</span>
            </div>
            <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage('profile')">
                <i class="fas fa-user text-2xl"></i>
                <span class="text-xs">我的</span>
            </div>
        </div>
    </div>

    <script>
        // 页面切换函数
        function switchPage(pageName) {
            // 隐藏所有页面
            document.querySelectorAll('.page-content').forEach(page => {
                page.classList.remove('active');
            });
            
            // 显示目标页面
            document.getElementById('page-' + pageName).classList.add('active');
            
            // 更新Tab状态
            document.querySelectorAll('.tab-item').forEach(tab => {
                tab.classList.remove('text-primary');
                tab.classList.add('text-gray-400');
                tab.querySelector('span').classList.remove('font-medium');
            });
            
            event.currentTarget.classList.remove('text-gray-400');
            event.currentTarget.classList.add('text-primary');
            event.currentTarget.querySelector('span').classList.add('font-medium');
            
            // 滚动到顶部
            document.querySelector('.app-content').scrollTop = 0;
        }
        
        // 初始化页面内容
        document.addEventListener('DOMContentLoaded', function() {
            loadHomePage();
            loadDevicesPage();
            loadHealthPage();
            loadProfilePage();
        });
    </script>
</body>
</html>
