<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宠联中枢 - 跨品牌智能养宠</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#FF9F43",
                        secondary: "#00B4D8",
                        success: "#52C41A",
                        warning: "#FAAD14"
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .iphone-frame { width: 393px; max-width: 100%; height: 852px; background: #F8F9FA; border-radius: 48px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 8px #3a3a3a; position: relative; }
        .dynamic-island { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 110px; height: 34px; background: #111; border-radius: 20px; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; color: white; font-size: 14px; font-weight: 600; }
        .app-content { height: calc(100% - 80px); overflow-y: auto; padding: 56px 16px 16px 16px; scrollbar-width: none; -ms-overflow-style: none; }
        .app-content::-webkit-scrollbar { display: none; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 0.5px solid rgba(255,255,255,0.5); }
        .page-content { display: none; }
        .page-content.active { display: block; }
        .online-dot { position: absolute; bottom: 2px; right: 2px; width: 12px; height: 12px; background: #52C41A; border: 2px solid white; border-radius: 50%; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="iphone-frame">
    <div class="dynamic-island"><span>9:41</span><div><i class="fas fa-signal"></i><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div></div>
    <div class="app-content" id="appContent"></div>
    <div class="absolute bottom-0 left-0 right-0 h-20 bg-white/90 backdrop-blur-xl border-t border-gray-200/50 flex items-center justify-around px-4 rounded-b-[48px]">
        <div class="tab-item flex flex-col items-center text-primary cursor-pointer" onclick="switchPage(0)"><i class="fas fa-home text-2xl"></i><span class="text-xs font-medium">首页</span></div>
        <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage(1)"><i class="fas fa-microchip text-2xl"></i><span class="text-xs">设备</span></div>
        <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage(2)"><i class="fas fa-heart-pulse text-2xl"></i><span class="text-xs">健康</span></div>
        <div class="tab-item flex flex-col items-center text-gray-400 cursor-pointer" onclick="switchPage(3)"><i class="fas fa-user text-2xl"></i><span class="text-xs">我的</span></div>
    </div>
</div>
<script>
const pages = [];
function switchPage(index) {
    document.getElementById("appContent").innerHTML = pages[index];
    document.querySelectorAll(".tab-item").forEach((tab, i) => {
        if (i === index) {
            tab.classList.remove("text-gray-400");
            tab.classList.add("text-primary");
        } else {
            tab.classList.remove("text-primary");
            tab.classList.add("text-gray-400");
        }
    });
    document.querySelector(".app-content").scrollTop = 0;
}
document.addEventListener("DOMContentLoaded", () => switchPage(0));
</script>
</body>
</html>
